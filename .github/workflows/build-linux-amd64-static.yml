name: build linux amd64 static

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      MUSL_CROSS_URL: https://musl.cc/x86_64-linux-musl-cross.tgz
      PREFIX: /tmp/xfrpc-amd64
      CROSS_TRIPLE: x86_64-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            cmake \
            curl \
            file \
            make \
            perl \
            pkg-config \
            tar \
            xz-utils \
            build-essential

      - name: Install x86_64 musl cross toolchain
        run: |
          set -eux
          mkdir -p /tmp/cross "${PREFIX}"
          curl -fsSL "${MUSL_CROSS_URL}" | tar -xz -C /tmp/cross --strip-components=1
          echo "/tmp/cross/bin" >> "${GITHUB_PATH}"

      - name: Build static third-party libraries
        shell: bash
        run: |
          set -eux
          export PATH="/tmp/cross/bin:${PATH}"
          export CC="${CROSS_TRIPLE}-gcc"
          export CXX="${CROSS_TRIPLE}-g++"
          export AR="${CROSS_TRIPLE}-ar"
          export RANLIB="${CROSS_TRIPLE}-ranlib"
          export CROSS_COMPILE="${CROSS_TRIPLE}-"

          cat >/tmp/amd64-musl-toolchain.cmake <<TOOLCHAIN
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR x86_64)
          set(CMAKE_C_COMPILER /tmp/cross/bin/x86_64-linux-musl-gcc)
          set(CMAKE_CXX_COMPILER /tmp/cross/bin/x86_64-linux-musl-g++)
          set(CMAKE_AR /tmp/cross/bin/x86_64-linux-musl-ar CACHE FILEPATH "")
          set(CMAKE_RANLIB /tmp/cross/bin/x86_64-linux-musl-ranlib CACHE FILEPATH "")
          set(CMAKE_STRIP /tmp/cross/bin/x86_64-linux-musl-strip CACHE FILEPATH "")
          set(CMAKE_FIND_ROOT_PATH ${PREFIX} /tmp/cross/x86_64-linux-musl)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          set(CMAKE_TRY_COMPILE_TARGET_TYPE STATIC_LIBRARY)
          set(CMAKE_FIND_LIBRARY_SUFFIXES .a)
          set(CMAKE_C_FLAGS_INIT "-Os -pipe")
          set(CMAKE_EXE_LINKER_FLAGS_INIT "-static")
          TOOLCHAIN

          cd thirdparty/openssl-1.1.1m
          make clean || true
          chmod +x Configure config
          ./Configure linux-x86_64 no-shared no-tests no-async \
            --prefix="${PREFIX}" \
            --openssldir="${PREFIX}/ssl"
          make -j"$(nproc)"
          make install_sw

          cd "${GITHUB_WORKSPACE}/thirdparty/zlib-1.2.13"
          make clean || true
          chmod +x configure
          CHOST="${CROSS_TRIPLE}" CC="${CC}" AR="${AR}" RANLIB="${RANLIB}" ./configure \
            --static \
            --prefix="${PREFIX}"
          make -j"$(nproc)"
          make install

          cmake -S "${GITHUB_WORKSPACE}/thirdparty/json-c" -B /tmp/build-json-c \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/amd64-musl-toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX="${PREFIX}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTING=OFF \
            -DDISABLE_WERROR=ON
          cmake --build /tmp/build-json-c -j"$(nproc)"
          cmake --install /tmp/build-json-c

          cmake -S "${GITHUB_WORKSPACE}/thirdparty/libevent-2.1.10" -B /tmp/build-libevent \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/amd64-musl-toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX="${PREFIX}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DEVENT__LIBRARY_TYPE=STATIC \
            -DEVENT__DISABLE_TESTS=ON \
            -DEVENT__DISABLE_SAMPLES=ON \
            -DEVENT__DISABLE_BENCHMARK=ON \
            -DEVENT__DISABLE_REGRESS=ON \
            -DEVENT__HAVE_KQUEUE=OFF \
            -DEVENT__HAVE_WORKING_KQUEUE=OFF \
            -DEVENT__HAVE_DEVPOLL=OFF \
            -DEVENT__HAVE_PORT_CREATE=OFF \
            -DEVENT__HAVE_ARC4RANDOM=OFF \
            -DEVENT__HAVE_ARC4RANDOM_BUF=OFF \
            -DEVENT__HAVE_ARC4RANDOM_ADDRANDOM=OFF \
            -DEVENT__HAVE_SYSCTL=OFF \
            -DEVENT__HAVE_ISSETUGID=OFF \
            -DEVENT__HAVE_MACH_ABSOLUTE_TIME=OFF \
            -DOPENSSL_ROOT_DIR="${PREFIX}" \
            -DOPENSSL_INCLUDE_DIR="${PREFIX}/include" \
            -DOPENSSL_SSL_LIBRARY="${PREFIX}/lib/libssl.a" \
            -DOPENSSL_CRYPTO_LIBRARY="${PREFIX}/lib/libcrypto.a"
          cmake --build /tmp/build-libevent -j"$(nproc)"
          cmake --install /tmp/build-libevent

      - name: Build xfrpc for linux amd64 static
        shell: bash
        run: |
          set -eux
          export PATH="/tmp/cross/bin:${PATH}"
          cmake -S . -B /tmp/build-xfrpc \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/amd64-musl-toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DDEBUG=OFF \
            -DENABLE_SANITIZER=OFF \
            -DCMAKE_PREFIX_PATH="${PREFIX}" \
            -DOPENSSL_ROOT_DIR="${PREFIX}" \
            -DOPENSSL_SSL_LIBRARY="${PREFIX}/lib/libssl.a" \
            -DOPENSSL_CRYPTO_LIBRARY="${PREFIX}/lib/libcrypto.a" \
            -DJSON-C_INCLUDE_DIR="${PREFIX}/include/json-c" \
            -DJSON-C_LIBRARY="${PREFIX}/lib/libjson-c.a" \
            -DZLIB_INCLUDE_DIR="${PREFIX}/include" \
            -DZLIB_LIBRARY="${PREFIX}/lib/libz.a" \
            -DCMAKE_C_FLAGS="-I${PREFIX}/include -I${PREFIX}/include/json-c" \
            -DCMAKE_EXE_LINKER_FLAGS="-static -L${PREFIX}/lib"
          cmake --build /tmp/build-xfrpc -j"$(nproc)"

          mkdir -p dist
          cp /tmp/build-xfrpc/xfrpc dist/xfrpc-linux-amd64-static
          x86_64-linux-musl-strip dist/xfrpc-linux-amd64-static
          file dist/xfrpc-linux-amd64-static

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xfrpc-linux-amd64-static
          path: dist/xfrpc-linux-amd64-static
          if-no-files-found: error
