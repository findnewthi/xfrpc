name: build linux amd64 and arm64 static

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            cross_triple: x86_64-linux-musl
            cmake_processor: x86_64
            openssl_target: linux-x86_64
            musl_cross_urls: https://vpn.uestc.eu.cc/proxy/https://musl.cc/x86_64-linux-musl-cross.tgz https://more.musl.cc/x86_64-linux-musl/x86_64-linux-musl-cross.tgz https://musl.cc/x86_64-linux-musl-cross.tgz
          - arch: arm64
            cross_triple: aarch64-linux-musl
            cmake_processor: aarch64
            openssl_target: linux-aarch64
            musl_cross_urls: https://vpn.uestc.eu.cc/proxy/https://musl.cc/aarch64-linux-musl-cross.tgz https://more.musl.cc/x86_64-linux-musl/aarch64-linux-musl-cross.tgz https://musl.cc/aarch64-linux-musl-cross.tgz

    env:
      PREFIX: /tmp/xfrpc-${{ matrix.arch }}
      CROSS_TRIPLE: ${{ matrix.cross_triple }}
      CMAKE_PROCESSOR: ${{ matrix.cmake_processor }}
      OPENSSL_TARGET: ${{ matrix.openssl_target }}
      MUSL_CROSS_URLS: ${{ matrix.musl_cross_urls }}
      TOOLCHAIN_FILE: /tmp/${{ matrix.arch }}-musl-toolchain.cmake

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            cmake \
            curl \
            file \
            make \
            perl \
            pkg-config \
            tar \
            xz-utils \
            build-essential

      - name: Install musl cross toolchain
        run: |
          set -eux
          mkdir -p /tmp/cross "${PREFIX}"
          for url in ${MUSL_CROSS_URLS}; do
            echo "Downloading musl cross toolchain from ${url}"
            if curl --connect-timeout 20 --retry 3 --retry-delay 5 -fL "${url}" -o /tmp/cross.tgz; then
              tar -xzf /tmp/cross.tgz -C /tmp/cross --strip-components=1
              rm -f /tmp/cross.tgz
              break
            fi
          done
          test -x "/tmp/cross/bin/${CROSS_TRIPLE}-gcc"
          echo "/tmp/cross/bin" >> "${GITHUB_PATH}"

      - name: Build static third-party libraries
        shell: bash
        run: |
          set -eux
          export PATH="/tmp/cross/bin:${PATH}"
          export CC="${CROSS_TRIPLE}-gcc"
          export CXX="${CROSS_TRIPLE}-g++"
          export AR="${CROSS_TRIPLE}-ar"
          export RANLIB="${CROSS_TRIPLE}-ranlib"

          cat >"${TOOLCHAIN_FILE}" <<TOOLCHAIN
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR ${CMAKE_PROCESSOR})
          set(CMAKE_C_COMPILER /tmp/cross/bin/${CROSS_TRIPLE}-gcc)
          set(CMAKE_CXX_COMPILER /tmp/cross/bin/${CROSS_TRIPLE}-g++)
          set(CMAKE_AR /tmp/cross/bin/${CROSS_TRIPLE}-ar CACHE FILEPATH "")
          set(CMAKE_RANLIB /tmp/cross/bin/${CROSS_TRIPLE}-ranlib CACHE FILEPATH "")
          set(CMAKE_STRIP /tmp/cross/bin/${CROSS_TRIPLE}-strip CACHE FILEPATH "")
          set(CMAKE_FIND_ROOT_PATH ${PREFIX} /tmp/cross/${CROSS_TRIPLE})
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          set(CMAKE_TRY_COMPILE_TARGET_TYPE STATIC_LIBRARY)
          set(CMAKE_FIND_LIBRARY_SUFFIXES .a)
          set(CMAKE_C_FLAGS_INIT "-Os -pipe")
          set(CMAKE_EXE_LINKER_FLAGS_INIT "-static")
          TOOLCHAIN

          cd thirdparty/openssl-1.1.1m
          make clean || true
          chmod +x Configure config
          ./Configure "${OPENSSL_TARGET}" no-shared no-tests no-async \
            --prefix="${PREFIX}" \
            --openssldir="${PREFIX}/ssl"
          make -j"$(nproc)"
          make install_sw

          cd "${GITHUB_WORKSPACE}/thirdparty/zlib-1.2.13"
          make clean || true
          chmod +x configure
          CHOST="${CROSS_TRIPLE}" CC="${CC}" AR="${AR}" RANLIB="${RANLIB}" ./configure \
            --static \
            --prefix="${PREFIX}"
          make -j"$(nproc)"
          make install

          cmake -S "${GITHUB_WORKSPACE}/thirdparty/json-c" -B /tmp/build-json-c-${{ matrix.arch }} \
            -DCMAKE_TOOLCHAIN_FILE="${TOOLCHAIN_FILE}" \
            -DCMAKE_INSTALL_PREFIX="${PREFIX}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTING=OFF \
            -DDISABLE_WERROR=ON
          cmake --build /tmp/build-json-c-${{ matrix.arch }} -j"$(nproc)"
          cmake --install /tmp/build-json-c-${{ matrix.arch }}

          cmake -S "${GITHUB_WORKSPACE}/thirdparty/libevent-2.1.10" -B /tmp/build-libevent-${{ matrix.arch }} \
            -DCMAKE_TOOLCHAIN_FILE="${TOOLCHAIN_FILE}" \
            -DCMAKE_INSTALL_PREFIX="${PREFIX}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DEVENT__LIBRARY_TYPE=STATIC \
            -DEVENT__DISABLE_TESTS=ON \
            -DEVENT__DISABLE_SAMPLES=ON \
            -DEVENT__DISABLE_BENCHMARK=ON \
            -DEVENT__DISABLE_REGRESS=ON \
            -DEVENT__HAVE_KQUEUE=OFF \
            -DEVENT__HAVE_WORKING_KQUEUE=OFF \
            -DEVENT__HAVE_DEVPOLL=OFF \
            -DEVENT__HAVE_PORT_CREATE=OFF \
            -DEVENT__HAVE_ARC4RANDOM=OFF \
            -DEVENT__HAVE_ARC4RANDOM_BUF=OFF \
            -DEVENT__HAVE_ARC4RANDOM_ADDRANDOM=OFF \
            -DEVENT__HAVE_SYSCTL=OFF \
            -DEVENT__HAVE_ISSETUGID=OFF \
            -DEVENT__HAVE_MACH_ABSOLUTE_TIME=OFF \
            -DOPENSSL_ROOT_DIR="${PREFIX}" \
            -DOPENSSL_INCLUDE_DIR="${PREFIX}/include" \
            -DOPENSSL_SSL_LIBRARY="${PREFIX}/lib/libssl.a" \
            -DOPENSSL_CRYPTO_LIBRARY="${PREFIX}/lib/libcrypto.a"
          cmake --build /tmp/build-libevent-${{ matrix.arch }} -j"$(nproc)"
          cmake --install /tmp/build-libevent-${{ matrix.arch }}

      - name: Build xfrpc for linux ${{ matrix.arch }} static
        shell: bash
        run: |
          set -eux
          export PATH="/tmp/cross/bin:${PATH}"
          cmake -S . -B /tmp/build-xfrpc-${{ matrix.arch }} \
            -DCMAKE_TOOLCHAIN_FILE="${TOOLCHAIN_FILE}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DDEBUG=OFF \
            -DENABLE_SANITIZER=OFF \
            -DCMAKE_PREFIX_PATH="${PREFIX}" \
            -DOPENSSL_ROOT_DIR="${PREFIX}" \
            -DOPENSSL_SSL_LIBRARY="${PREFIX}/lib/libssl.a" \
            -DOPENSSL_CRYPTO_LIBRARY="${PREFIX}/lib/libcrypto.a" \
            -DJSON-C_INCLUDE_DIR="${PREFIX}/include/json-c" \
            -DJSON-C_LIBRARY="${PREFIX}/lib/libjson-c.a" \
            -DZLIB_INCLUDE_DIR="${PREFIX}/include" \
            -DZLIB_LIBRARY="${PREFIX}/lib/libz.a" \
            -DCMAKE_C_FLAGS="-I${PREFIX}/include -I${PREFIX}/include/json-c" \
            -DCMAKE_EXE_LINKER_FLAGS="-static -L${PREFIX}/lib"
          cmake --build /tmp/build-xfrpc-${{ matrix.arch }} -j"$(nproc)"

          mkdir -p dist
          cp /tmp/build-xfrpc-${{ matrix.arch }}/xfrpc dist/xfrpc-linux-${{ matrix.arch }}-static
          "${CROSS_TRIPLE}-strip" dist/xfrpc-linux-${{ matrix.arch }}-static
          file dist/xfrpc-linux-${{ matrix.arch }}-static

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xfrpc-linux-${{ matrix.arch }}-static
          path: dist/xfrpc-linux-${{ matrix.arch }}-static
          if-no-files-found: error
