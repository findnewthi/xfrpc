name: build linux mipsle softfloat static

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      MUSL_CROSS_URLS: https://vpn.uestc.eu.cc/proxy/https://musl.cc/mipsel-linux-muslsf-cross.tgz https://more.musl.cc/x86_64-linux-musl/mipsel-linux-muslsf-cross.tgz https://musl.cc/mipsel-linux-muslsf-cross.tgz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build xfrpc for linux mipsle softfloat static
        run: |
          set -eux
          rm -rf dist
          docker build \
            --progress=plain \
            -f docker/Dockerfile.mipsel-softfloat-static \
            --build-arg MUSL_CROSS_URLS="${MUSL_CROSS_URLS}" \
            --target artifact \
            --output type=local,dest=dist \
            .
          mv dist/xfrpc-mipsel-softfloat-static dist/xfrpc-linux-mipsle-softfloat-static
          file dist/xfrpc-linux-mipsle-softfloat-static

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xfrpc-linux-mipsle-softfloat-static
          path: dist/xfrpc-linux-mipsle-softfloat-static
          if-no-files-found: error
